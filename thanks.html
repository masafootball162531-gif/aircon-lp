<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <meta name="description" content="お問い合わせありがとうございます。エアコン修理のご相談を受け付けました。">
  <title>お問い合わせありがとうございます｜電気のタスケル</title>
  <link rel="stylesheet" href="./css/styles.css">
  <style>
    main.thanks-main {
      min-height: 100vh;
      padding: 40px 18px 120px;
      background: linear-gradient(180deg, #ffffff 0%, #e9f7ff 100%);
    }

    .thanks-panel {
      margin: 72px auto 0;
      padding: 28px 20px;
      color: var(--ink);
      text-align: center;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .thanks-panel h1 {
      margin: 0 0 14px;
      color: var(--blue-dark);
      font-size: 24px;
      line-height: 1.35;
    }

    .thanks-panel p {
      margin: 0 0 12px;
      font-size: 15px;
      line-height: 1.8;
    }

    .thanks-home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      margin-top: 16px;
      padding: 0 22px;
      color: #ffffff;
      font-weight: 900;
      background: linear-gradient(180deg, var(--blue) 0%, var(--blue-dark) 100%);
      border-radius: 999px;
      box-shadow: 0 8px 16px rgba(7, 77, 153, 0.24);
    }
  </style>
</head>
<body>
  <main class="thanks-main">
    <section class="thanks-panel" aria-labelledby="thanks-title">
      <h1 id="thanks-title">お問い合わせありがとうございます。</h1>
      <p>内容を確認のうえ、担当者よりご連絡いたします。</p>
      <p>お急ぎの場合は、お電話でもご相談いただけます。</p>
      <a class="thanks-home-link" href="./index.html">トップページへ戻る</a>
    </section>
  </main>
</body>
</html>
